<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcade Road Trip Serverless Prototype</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height: 100%; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; color: #17202a; overflow: hidden; }
    main { display: grid; grid-template-columns: minmax(460px, 1fr) minmax(480px, 1fr); height: 100vh; width: 100vw; overflow: hidden; }
    aside { border-right: 1px solid #d8dee4; min-height: 0; overflow: hidden; display: flex; flex-direction: column; background: white; }
    .controls { flex: 0 0 auto; padding: 14px 16px 10px; border-bottom: 1px solid #e6ebf0; }
    h1 { font-size: 23px; margin: 0 0 4px; }
    .subhead { margin: 0 0 10px; color: #51606d; font-size: 13px; }
    label { display: block; font-size: 12px; font-weight: 650; margin: 0 0 4px; }
    input, button { width: 100%; box-sizing: border-box; font: inherit; padding: 8px 9px; margin: 0; }
    button { cursor: pointer; border: 0; background: #0d6efd; color: white; border-radius: 6px; font-weight: 700; white-space: nowrap; }
    button:disabled { cursor: wait; opacity: .72; }
    .trip-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 8px; align-items: end; }
    .action-row { display: grid; grid-template-columns: minmax(120px, 180px) minmax(110px, 150px); gap: 8px; align-items: end; margin-top: 8px; }
    .detour-field label { display: flex; justify-content: space-between; gap: 8px; }
    .results-shell { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .section-title { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px 8px; border-bottom: 1px solid #edf1f5; }
    .section-title h2 { font-size: 16px; margin: 0; }
    .legend { color: #51606d; font-size: 12px; line-height: 1.35; display: flex; flex-wrap: wrap; gap: 8px; }
    .results { flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior: contain; padding: 0 16px 18px; scroll-padding-top: 12px; }
    #map { height: 100vh; min-width: 0; }
    .stop { border-top: 1px solid #e6ebf0; padding: 12px 0; cursor: pointer; border-radius: 6px; }
    .stop:hover { background: #f7f9fb; }
    .stop.active { background: #e8f1ff; outline: 2px solid #0d6efd; outline-offset: -2px; padding-left: 8px; padding-right: 8px; }
    .stop h2 { font-size: 17px; margin: 0 0 4px; }
    .meta { color: #51606d; font-size: 13px; }
    .games { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); column-gap: 14px; row-gap: 2px; font-size: 13px; margin-top: 8px; }
    .game { display: block; line-height: 1.25; margin: 0 0 4px; }
    .rare-us { color: #d000ff; font-weight: 800; }
    .unique-state { font-weight: 800; }
    .machine-count { color: #51606d; font-size: 11px; font-weight: 650; margin-left: 3px; }
    .common-game { color: #51606d; font-weight: 400; }
    .status, .error { margin-top: 10px; font-size: 13px; }
    .status { color: #425466; }
    .error { color: #b00020; }
    .loading { display: flex; align-items: center; gap: 10px; color: #425466; padding: 18px 0; font-weight: 650; }
    .car-track { width: 70px; height: 24px; position: relative; overflow: hidden; border-bottom: 2px dashed #ccd6df; }
    .car { position: absolute; left: -34px; bottom: 4px; width: 26px; height: 10px; background: #0d6efd; border-radius: 7px 9px 4px 4px; animation: drive 1.35s linear infinite; }
    .car::before { content: ""; position: absolute; left: 7px; top: -6px; width: 12px; height: 7px; background: #7fb3ff; border-radius: 7px 7px 0 0; }
    .car::after { content: ""; position: absolute; left: 4px; bottom: -4px; width: 4px; height: 4px; background: #17202a; border-radius: 50%; box-shadow: 14px 0 0 #17202a; }
    @keyframes drive { from { transform: translateX(0); } to { transform: translateX(106px); } }
    @media (max-width: 850px) {
      body { overflow: auto; }
      main { grid-template-columns: 1fr; grid-template-rows: minmax(320px, 52vh) minmax(0, 48vh); height: 100vh; }
      aside { grid-row: 2; border-right: 0; border-top: 1px solid #d8dee4; }
      #map { grid-row: 1; height: 100%; min-height: 0; }
      .trip-grid, .action-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main>
  <aside>
    <div class="controls">
      <h1>Arcade Road Trip</h1>
      <p class="subhead">DuckDB-WASM static prototype. Data loads from Parquet in your browser.</p>
      <div class="trip-grid">
        <div>
          <label>Origin</label>
          <input id="origin" value="South Jordan, UT" placeholder="South Jordan, UT or 40.56,-111.93" />
        </div>
        <div>
          <label>Destination</label>
          <input id="destination" value="Ogden, UT" placeholder="Ogden, UT" />
        </div>
      </div>
      <div class="action-row">
        <div class="detour-field">
          <label><span>Max detour</span><span><span id="detourLabel">15</span> mi</span></label>
          <input id="detour" type="range" min="2" max="60" value="15" />
        </div>
        <button id="plan" disabled>Loading data...</button>
      </div>
      <div id="status" class="status"></div>
      <div id="message" class="error"></div>
    </div>
    <div class="results-shell">
      <div class="section-title">
        <h2>Arcades:</h2>
        <div class="legend">
          <span class="rare-us">Under 10 in U.S.</span>
          <span class="unique-state">Only one in state</span>
          <span class="common-game">more common</span>
        </div>
      </div>
      <div id="stops" class="results"></div>
    </div>
  </aside>
  <div id="map"></div>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm';

const DATA_BASE = './data/';
const EMBEDDED_PARQUET = null;
const continentalBounds = L.latLngBounds([24.396308, -124.848974], [49.384358, -66.885444]);
const ACTIVE_LIMIT = 25;
const map = L.map('map', {maxBounds: continentalBounds, maxBoundsViscosity: 1.0, minZoom: 4}).setView([39.5, -98.35], 4);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'}).addTo(map);

let conn, routeLayer, markers = [];
let markerByLocationId = new Map();
const $ = id => document.getElementById(id);
$('detour').addEventListener('input', () => $('detourLabel').textContent = $('detour').value);

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[ch]));
}
function rowObjects(result) {
  return result.toArray().map(row => row.toJSON ? row.toJSON() : Object.fromEntries(row));
}
function parsePoint(text) {
  const parts = text.split(',').map(v => Number(v.trim()));
  if (parts.length === 2 && parts.every(Number.isFinite)) return {lat: parts[0], lon: parts[1]};
  return null;
}
async function geocode(text, label) {
  text = text.trim();
  if (!text) throw new Error(`Enter a ${label}.`);
  const point = parsePoint(text);
  if (point) return point;
  const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=us&q=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (!res.ok || !data?.length) throw new Error(`Could not geocode: ${text}`);
  return {lat: Number(data[0].lat), lon: Number(data[0].lon)};
}
async function routeBetween(origin, destination) {
  const url = `https://router.project-osrm.org/route/v1/driving/${origin.lon},${origin.lat};${destination.lon},${destination.lat}?overview=full&geometries=geojson&steps=false`;
  const res = await fetch(url);
  const data = await res.json();
  if (!res.ok || !data.routes?.length) throw new Error('No route found.');
  return data.routes[0];
}
function haversineMiles(a, b) {
  const radius = 3958.7613;
  const phi1 = a.lat * Math.PI / 180, phi2 = b.lat * Math.PI / 180;
  const dphi = (b.lat - a.lat) * Math.PI / 180;
  const dlambda = (b.lon - a.lon) * Math.PI / 180;
  const h = Math.sin(dphi / 2) ** 2 + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dlambda / 2) ** 2;
  return radius * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
}
function projectDistanceMiles(point, routePoints) {
  let best = Infinity;
  const stride = Math.max(1, Math.floor(routePoints.length / 650));
  for (let i = 0; i < routePoints.length; i += stride) best = Math.min(best, haversineMiles(point, routePoints[i]));
  return best;
}
function routeBounds(routePoints, maxDetourMiles) {
  const lats = routePoints.map(p => p.lat), lons = routePoints.map(p => p.lon);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const latPadding = maxDetourMiles / 69.0;
  const midLat = (minLat + maxLat) / 2;
  const milesPerLonDegree = Math.max(20.0, 69.0 * Math.cos(midLat * Math.PI / 180));
  const lonPadding = maxDetourMiles / milesPerLonDegree;
  return {minLat: minLat - latPadding, maxLat: maxLat + latPadding, minLon: minLon - lonPadding, maxLon: maxLon + lonPadding};
}
function sqlNumber(value) {
  const number = Number(value);
  if (!Number.isFinite(number)) throw new Error('Internal numeric query error.');
  return number;
}
async function candidateLocations(bounds) {
  const result = await conn.query(`
    SELECT *
    FROM route_locations
    WHERE latitude BETWEEN ${sqlNumber(bounds.minLat)} AND ${sqlNumber(bounds.maxLat)}
      AND longitude BETWEEN ${sqlNumber(bounds.minLon)} AND ${sqlNumber(bounds.maxLon)}
    ORDER BY game_count DESC
    LIMIT 2000
  `);
  return rowObjects(result);
}
async function gamesForLocations(locationIds) {
  if (!locationIds.length) return new Map();
  const ids = locationIds.map(id => Number(id)).filter(Number.isFinite).join(',');
  const result = await conn.query(`
    SELECT *
    FROM location_games
    WHERE location_id IN (${ids})
    ORDER BY rare_us DESC, unique_state DESC, cabinet_type, name
  `);
  const grouped = new Map();
  for (const row of rowObjects(result)) {
    if (!grouped.has(row.location_id)) grouped.set(row.location_id, []);
    grouped.get(row.location_id).push(row);
  }
  return grouped;
}
function renderHighlights(highlights) {
  return highlights.map(game => {
    const name = escapeHtml(game.name);
    let content = name;
    if (Number(game.rare_us)) {
      const count = `<span class="machine-count">(${game.us_location_count} US)</span>`;
      content = `<strong class="rare-us" title="Known at ${game.us_location_count} active continental U.S. locations">${name}${count}</strong>`;
    } else if (Number(game.unique_state)) {
      content = `<strong class="unique-state" title="Only known active ${escapeHtml(game.location_state)} location">${name}</strong>`;
    }
    return `<span class="game">${content}</span>`;
  }).join('');
}
function selectStop(locationId, options = {}) {
  document.querySelectorAll('.stop.active').forEach(el => el.classList.remove('active'));
  const card = document.querySelector(`.stop[data-location-id="${locationId}"]`);
  if (card) {
    card.classList.add('active');
    if (options.scroll !== false) $('stops').scrollTo({top: card.offsetTop - $('stops').offsetTop, behavior: 'smooth'});
  }
  const marker = markerByLocationId.get(Number(locationId));
  if (marker) {
    marker.openPopup();
    if (options.pan !== false) map.panTo(marker.getLatLng(), {animate: true});
  }
}
async function planTrip() {
  $('message').textContent = '';
  $('stops').innerHTML = `<div class="loading"><span>Planning your trip...</span><span class="car-track" aria-hidden="true"><span class="car"></span></span></div>`;
  $('plan').disabled = true;
  $('plan').textContent = 'Planning...';
  try {
    const origin = await geocode($('origin').value, 'starting point');
    const destination = await geocode($('destination').value, 'destination');
    const route = await routeBetween(origin, destination);
    const routePoints = route.geometry.coordinates.map(([lon, lat]) => ({lat, lon}));
    const maxDetour = Number($('detour').value);
    const bounds = routeBounds(routePoints, maxDetour);
    const candidates = await candidateLocations(bounds);
    const stops = candidates.map(loc => {
      const routeDistance = projectDistanceMiles({lat: Number(loc.latitude), lon: Number(loc.longitude)}, routePoints);
      const estimatedDetour = routeDistance * 2;
      const sourceBonus = loc.source_tags ? 10 : 0;
      return {
        ...loc,
        route_distance_miles: routeDistance,
        estimated_detour_miles: estimatedDetour,
        score: Number(loc.game_count || 0) * 1.5 + Number(loc.pinball_games || 0) * 0.6 + Number(loc.rhythm_games || 0) * 2.0 + sourceBonus - estimatedDetour * 2.5
      };
    }).filter(loc => loc.estimated_detour_miles <= maxDetour)
      .sort((a, b) => b.score - a.score)
      .slice(0, ACTIVE_LIMIT);
    const games = await gamesForLocations(stops.map(stop => stop.location_id));

    if (routeLayer) map.removeLayer(routeLayer);
    markers.forEach(marker => map.removeLayer(marker));
    markers = [];
    markerByLocationId = new Map();
    routeLayer = L.geoJSON(route.geometry, {style: {color: '#0d6efd', weight: 5}}).addTo(map);
    map.fitBounds(routeLayer.getBounds(), {padding: [24, 24], maxZoom: 12});
    stops.forEach(stop => {
      const marker = L.marker([stop.latitude, stop.longitude]).addTo(map).bindPopup(`<b>${escapeHtml(stop.name)}</b><br>${escapeHtml(stop.city)}, ${escapeHtml(stop.state)}<br>${stop.estimated_detour_miles.toFixed(2)} mi detour`);
      marker.on('click', () => selectStop(stop.location_id, {pan: false}));
      markers.push(marker);
      markerByLocationId.set(Number(stop.location_id), marker);
    });
    $('stops').innerHTML = stops.map(stop => `
      <section class="stop" data-location-id="${stop.location_id}" tabindex="0" role="button" aria-label="Show ${escapeHtml(stop.name)} on map">
        <h2>${escapeHtml(stop.name)}</h2>
        <div class="meta">${escapeHtml(stop.city)}, ${escapeHtml(stop.state)} · ${Number(stop.game_count || 0).toLocaleString()} games · ${stop.estimated_detour_miles.toFixed(2)} mi estimated detour · ${escapeHtml(stop.source_tags || 'local')}</div>
        <div class="games">${renderHighlights(games.get(stop.location_id) || [])}</div>
      </section>`).join('') || '<p>No stops inside this detour budget.</p>';
    document.querySelectorAll('.stop[data-location-id]').forEach(card => {
      card.addEventListener('click', () => selectStop(card.dataset.locationId));
      card.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          selectStop(card.dataset.locationId);
        }
      });
    });
  } catch (err) {
    $('message').textContent = err.message;
    $('stops').innerHTML = '';
  } finally {
    $('plan').disabled = false;
    $('plan').textContent = 'Plan trip';
  }
}
async function bootDuckDB() {
  $('status').textContent = 'Loading DuckDB-WASM and Parquet data...';
  const bundles = duckdb.getJsDelivrBundles();
  const bundle = await duckdb.selectBundle(bundles);
  const workerUrl = URL.createObjectURL(new Blob([`importScripts("${bundle.mainWorker}");`], {type: 'text/javascript'}));
  const worker = new Worker(workerUrl);
  const db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
  await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
  URL.revokeObjectURL(workerUrl);
  let manifest = null;
  if (EMBEDDED_PARQUET) {
    await db.registerFileBuffer('route_locations.parquet', base64ToBytes(EMBEDDED_PARQUET.route_locations));
    await db.registerFileBuffer('location_games.parquet', base64ToBytes(EMBEDDED_PARQUET.location_games));
    manifest = EMBEDDED_PARQUET.manifest;
  } else {
    await db.registerFileURL('route_locations.parquet', `${DATA_BASE}route_locations.parquet`, duckdb.DuckDBDataProtocol.HTTP, false);
    await db.registerFileURL('location_games.parquet', `${DATA_BASE}location_games.parquet`, duckdb.DuckDBDataProtocol.HTTP, false);
  }
  conn = await db.connect();
  await conn.query("CREATE VIEW route_locations AS SELECT * FROM read_parquet('route_locations.parquet')");
  await conn.query("CREATE VIEW location_games AS SELECT * FROM read_parquet('location_games.parquet')");
  manifest = manifest || await fetch(`${DATA_BASE}manifest.json`).then(res => res.ok ? res.json() : null).catch(() => null);
  $('status').textContent = manifest ? `Loaded ${manifest.counts.route_locations.toLocaleString()} arcades and ${manifest.counts.location_games.toLocaleString()} machine placements.` : 'Loaded static arcade data.';
  $('plan').disabled = false;
  $('plan').textContent = 'Plan trip';
}
function base64ToBytes(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
$('plan').addEventListener('click', planTrip);
bootDuckDB().catch(err => {
  $('message').textContent = `Could not load static DuckDB data: ${err.message}`;
  $('status').textContent = '';
});
</script>
</body>
</html>
